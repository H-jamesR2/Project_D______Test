artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parses an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small access log and emit summary stats into JSON."
solution_explanation = "Read the log, count requests and unique IPs, find the top path."
verification_explanation = "Verify JSON file contains total_requests, unique_ips, and top_path with correct types and match exactly what is expected of them (correct count for total_requests and unique_ips); top_path is accepted if it matches any path tied for the highest count, since tie-breaking order is not part of the task spec."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
